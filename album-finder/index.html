<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a0f1a">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="favicon.png" type="image/png">
  <title></title>
  <style>
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      background-color: #1a0f1a;
      background-image: linear-gradient(145deg, #1a0f1a 0%, #2d1b2e 40%, #1a0f1a 100%);
    }
    html::before {
      content: "";
      position: fixed;
      top: calc(-1 * env(safe-area-inset-top, 0px));
      left: calc(-1 * env(safe-area-inset-left, 0px));
      right: calc(-1 * env(safe-area-inset-right, 0px));
      bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
      background-color: #1a0f1a;
      background-image: linear-gradient(145deg, #1a0f1a 0%, #2d1b2e 40%, #1a0f1a 100%);
      z-index: -1;
    }
    :root {
      --bg: #0f172a;
      --accent: #da70d6;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
      --shell-border: rgba(172, 158, 188, 0.34);
      --shell-border-soft: rgba(172, 158, 188, 0.18);
      --shell-surface: linear-gradient(168deg, #243a4e 0%, #1c3144 50%, #152838 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background-color: #1a0f1a;
      background-image: linear-gradient(145deg, #1a0f1a 0%, #2d1b2e 40%, #1a0f1a 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: calc(32px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(48px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .shell {
      width: 100%;
      max-width: 720px;
      background: var(--shell-surface);
      border-radius: 28px;
      border: 1px solid var(--shell-border);
      box-shadow: var(--shadow);
      padding: 20px 22px 26px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 650;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 4px 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(218, 112, 214, 0.55);
      background: radial-gradient(circle at top left, rgba(230, 168, 215, 0.28), transparent 55%);
    }
    .title-breadcrumb a {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-decoration: none;
    }
    .title-breadcrumb a:hover {
      text-decoration: underline;
    }
    .title-breadcrumb-sep {
      color: rgba(218, 112, 214, 0.65);
      font-size: 0.65rem;
      user-select: none;
    }
    .title-breadcrumb-current {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      padding-right: 6px;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
    }
    /* Only the direct meta pill ť not nested spans (e.g. store-count-suffix). */
    .meta > span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--shell-surface);
      border: 1px solid var(--shell-border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .meta > span strong {
      color: var(--text);
      font-weight: 550;
    }

    .intro {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .credit {
      width: 100%;
      max-width: 720px;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 14px;
      text-align: center;
    }
    .credit a {
      color: #c4b5fd;
      text-decoration: none;
    }
    .credit a:hover {
      color: #f5d0fe;
      text-decoration: underline;
    }

    .search-row {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;
    }
    .search-row input[type="text"] {
      flex: 1 1 12rem;
      min-width: 0;
      font-size: 0.9rem;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--shell-border);
      background: var(--shell-surface);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .search-row input[type="text"]::placeholder {
      color: var(--muted);
    }
    .search-row input[type="text"]:focus {
      outline: none;
      border-color: rgba(218, 112, 214, 0.55);
    }
    .search-row .custom-select {
      flex: 0 0 auto;
      display: inline-block;
      position: relative;
      vertical-align: baseline;
      max-width: 100%;
    }

    .custom-select-btn {
      width: 100%;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 8px 30px 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--shell-border);
      background: var(--shell-surface);
      color: var(--text);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      text-align: left;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .custom-select-btn::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-right: 2px solid rgba(229, 231, 235, 0.85);
      border-bottom: 2px solid rgba(229, 231, 235, 0.85);
      transform: translateY(-58%) rotate(45deg);
      pointer-events: none;
    }

    .custom-select.is-open .custom-select-btn::after {
      transform: translateY(-38%) rotate(-135deg);
    }

    .custom-select-btn:hover {
      border-color: rgba(218, 112, 214, 0.45);
    }

    .custom-select-btn:focus-visible {
      outline: none;
      border-color: rgba(218, 112, 214, 0.75);
    }

    .custom-select-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 100%;
      width: max-content;
      max-width: min(100vw - 32px, 520px);
      box-sizing: border-box;
      max-height: 260px;
      overflow: auto;
      border-radius: 10px;
      border: 1px solid var(--shell-border);
      background: #1e3245;
      box-shadow: 0 12px 28px rgba(6, 8, 14, 0.5);
      z-index: 120;
      padding: 4px;
    }

    .custom-select-list[hidden] {
      display: none;
    }

    .custom-select-option {
      display: block;
      width: max-content;
      min-width: 100%;
      box-sizing: border-box;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .custom-select-option:hover,
    .custom-select-option:focus-visible {
      background: rgba(218, 112, 214, 0.16);
      outline: none;
    }

    .custom-select-option.is-active {
      background: rgba(218, 112, 214, 0.24);
      color: #fde7ff;
    }

    .select-native.is-enhanced {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      border: 0;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      overflow: hidden;
      white-space: nowrap;
    }
    .visually-hidden-submit {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .results-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .open-all-mobile-slot {
      display: none;
    }

    .open-all-desktop-slot {
      display: flex;
      justify-content: flex-end;
    }

    .open-all-tabs {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.2;
      min-height: 0;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(218, 112, 214, 0.46);
      background: linear-gradient(
        158deg,
        rgba(249, 197, 255, 0.26) 0%,
        rgba(218, 112, 214, 0.26) 38%,
        rgba(168, 85, 247, 0.2) 66%,
        rgba(28, 49, 68, 0.95) 100%
      );
      color: var(--text);
      cursor: pointer;
      margin: 0;
      box-shadow:
        inset 0 1px 0 rgba(255, 232, 255, 0.36),
        0 9px 18px rgba(130, 61, 162, 0.26),
        0 0 0 1px rgba(218, 112, 214, 0.08);
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }
    .open-all-tabs:hover:not(:disabled) {
      border-color: rgba(244, 176, 246, 0.74);
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255, 238, 255, 0.45),
        0 13px 24px rgba(142, 67, 180, 0.34),
        0 0 0 1px rgba(244, 176, 246, 0.16);
    }
    .open-all-tabs:focus-visible {
      outline: none;
      border-color: rgba(250, 211, 255, 0.95);
      box-shadow:
        0 0 0 2px rgba(218, 112, 214, 0.28),
        inset 0 1px 0 rgba(255, 238, 255, 0.45),
        0 13px 24px rgba(142, 67, 180, 0.34);
    }
    .open-all-tabs:disabled {
      opacity: 0.58;
      transform: none;
      cursor: not-allowed;
      border-color: rgba(218, 112, 214, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 238, 255, 0.16);
    }
    .open-all-feedback {
      margin: 0 0 10px;
      font-size: 0.8rem;
    }
    .tab-helper {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--shell-border-soft);
      background: linear-gradient(160deg, rgba(196, 181, 253, 0.08), rgba(30, 50, 69, 0.35));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .tab-helper-title {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ddd6fe;
      margin-bottom: 6px;
    }
    .tab-helper-copy {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.35;
    }
    .tab-helper-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tab-helper-btn {
      font-size: 0.78rem;
      font-weight: 560;
      letter-spacing: 0.01em;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--shell-border);
      background: var(--shell-surface);
      color: var(--text);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .tab-helper-btn:hover {
      border-color: rgba(218, 112, 214, 0.45);
    }
    .tab-helper-btn:focus-visible {
      outline: none;
      border-color: rgba(218, 112, 214, 0.75);
    }
    .tab-helper-progress {
      font-size: 0.78rem;
      color: #ddd6fe;
      margin-bottom: 8px;
    }
    .tab-helper-list {
      display: flex;
      flex-direction: column;
      gap: 0.14rem;
      max-height: 160px;
      overflow: auto;
      padding-right: 4px;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
    }
    .shop-link {
      color: #c4b5fd;
      text-decoration: none;
      padding: 0.1rem 0;
      font-size: 0.92rem;
      line-height: 1.25;
    }
    .shop-link:hover {
      color: #f5d0fe;
    }
    .hint,
    .error {
      font-size: 0.875rem;
      margin: 0;
      line-height: 1.45;
    }
    .hint {
      color: var(--muted);
    }
    .error {
      color: #fca5a5;
    }

    @media (max-width: 760px) {
      .search-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: stretch;
      }
      .search-row input[type="text"] {
        grid-column: 1 / -1;
      }
      .search-row .custom-select {
        width: 100%;
      }
      .search-row .custom-select-btn {
        min-height: 36px;
      }
      .open-all-mobile-slot {
        display: block;
        width: 100%;
      }
      .open-all-mobile-slot .open-all-tabs {
        width: 100%;
        min-width: 0;
        min-height: 36px;
      }
      .open-all-desktop-slot {
        display: none;
      }
      .results-header {
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="title">
        <nav class="title-breadcrumb" aria-label="Breadcrumb">
          <a href="/">Projects</a>
          <span class="title-breadcrumb-sep" aria-hidden="true">&gt;</span>
          <span class="title-breadcrumb-current" id="project-breadcrumb-label"></span>
        </nav>
      </div>
      <div class="meta">
        <span id="store-count-meta" aria-live="polite"><strong>...</strong><span class="store-count-suffix"></span></span>
      </div>
    </header>

    <p class="intro">Search for the album you want across multiple record stores in one go.</p>

    <form id="search-form" class="search-row" role="search" aria-label="Album search">
      <input id="query" type="text" name="q" inputmode="search" enterkeyhint="search" autocomplete="off" placeholder="Artist or album..." autofocus>
      <select id="format" name="format" aria-label="Release format">
        <option value="" selected disabled>Choose a format...</option>
        <option value="vinyl">Vinyl</option>
        <option value="cd">CD</option>
      </select>
      <div id="open-all-mobile-slot" class="open-all-mobile-slot"></div>
      <button type="submit" class="visually-hidden-submit" tabindex="-1" aria-hidden="true">Submit</button>
    </form>

    <div class="results-header">
      <p class="results-label">Record stores</p>
      <div id="open-all-desktop-slot" class="open-all-desktop-slot">
        <button type="button" id="open-all-tabs" class="open-all-tabs" disabled aria-label="Open all in new tabs">Open all in new tabs</button>
      </div>
    </div>
    <p id="open-all-feedback" class="hint open-all-feedback" aria-live="polite" hidden></p>
    <section id="tab-helper" class="tab-helper" hidden aria-live="polite">
      <p class="tab-helper-title">Tab launch helper</p>
      <p class="tab-helper-copy">Your browser blocked part of the batch. Open one per click or copy remaining links.</p>
      <div class="tab-helper-actions">
        <button type="button" id="open-next-tab" class="tab-helper-btn">Open next blocked tab</button>
        <button type="button" id="copy-all-urls" class="tab-helper-btn">Copy remaining links</button>
      </div>
      <p id="tab-helper-progress" class="tab-helper-progress"></p>
      <div id="tab-helper-list" class="tab-helper-list"></div>
    </section>
    <section id="results" aria-live="polite"></section>
  </div>

  <p class="credit">Based on an app developed by <a href="https://github.com/revolter" target="_blank" rel="noopener noreferrer">Iulian Onofrei (@revolter)</a>.</p>
  <script>
  (function () {
    var CACHE_KEY = "project_label:v1";
    var el = document.getElementById("project-breadcrumb-label");
    if (el && el.textContent && el.textContent.trim()) return;
    function apply(d) {
      if (!d) return;
      if (el && typeof d.label === "string" && d.label) el.textContent = d.label;
      if (typeof d.document_title === "string" && d.document_title) document.title = d.document_title;
    }
    function remember(d) {
      try {
        if (d && typeof d.label === "string" && d.label && typeof d.document_title === "string" && d.document_title) {
          sessionStorage.setItem(CACHE_KEY, JSON.stringify({ label: d.label, document_title: d.document_title }));
        }
      } catch (e) {}
    }
    try {
      var raw = sessionStorage.getItem(CACHE_KEY);
      if (raw) {
        var c = JSON.parse(raw);
        if (c && typeof c.label === "string" && typeof c.document_title === "string") apply(c);
      }
    } catch (e) {}
    fetch("project_label.json", { credentials: "same-origin" })
      .then(function (r) {
        return r.ok ? r.json() : Promise.reject();
      })
      .then(function (d) {
        apply(d);
        remember(d);
      })
      .catch(function () {});
  })();
  </script>
  <script src="album_finder.js?v=14" defer></script>
</body>
</html>
