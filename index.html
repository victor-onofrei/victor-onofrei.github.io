<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Victor Onofrei's sites</title>
<style>
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;background:linear-gradient(145deg,#0f172a 0%,#1e1b4b 40%,#0f172a 100%);color:#e2e8f0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
.hero{width:80px;height:80px;margin-bottom:2rem;border-radius:16px;background:linear-gradient(135deg,#334155 0%,#1e293b 50%,#0f172a 100%);box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;}
h1{font-size:1.5rem;font-weight:600;letter-spacing:.06em;margin:0 0 0.5rem;color:#cbd5e1;}
p{font-size:0.9rem;color:#64748b;margin:0 0 2rem;}
.links{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;}
.links a{display:inline-block;padding:0.85rem 1.75rem;background:rgba(30,41,59,0.8);color:#a5b4fc;text-decoration:none;font-weight:600;letter-spacing:.03em;border-radius:999px;border:1px solid #334155;transition:background .2s,color .2s,border-color .2s,transform .15s;}
.links a:hover{background:#4f46e5;color:#fff;border-color:#4f46e5;transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,0.35);}
</style>
</head>
<body>
<div class="hero"><img src="https://github.com/victor-onofrei.png" alt=""></div>
<h1>Victor Onofrei's sites</h1>
<p>Pick one to explore</p>
<nav class="links">
<a href="/Vinyl/">🎵 Record Collection</a>
</nav>
</body>
</html>
