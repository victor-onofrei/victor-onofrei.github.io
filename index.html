<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="https://github.com/victor-onofrei.png" type="image/png">
<title>Victor Onofrei's Projects</title>
<style>
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;background:linear-gradient(145deg,#1a0f1a 0%,#2d1b2e 40%,#1a0f1a 100%);color:#e2e8f0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
.hero{width:80px;height:80px;margin-bottom:2rem;border-radius:16px;background:linear-gradient(135deg,#3d2d3e 0%,#2d1b2e 50%,#1a0f1a 100%);box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;}
h1{font-size:1.5rem;font-weight:600;letter-spacing:.06em;margin:0 0 0.25rem;color:#e8dde8;}
.intro{font-size:0.9rem;color:#c4b0c4;margin:0 0 0.5rem;}
p{font-size:0.9rem;color:#9a8a9a;margin:0 0 2rem;}
.links{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;}
.links a{display:inline-block;padding:0.85rem 1.75rem;background:linear-gradient(145deg,rgba(15,23,42,0.96),rgba(30,41,59,0.98));color:#E6A8D7;text-decoration:none;font-weight:600;letter-spacing:.03em;border-radius:28px;border:1px solid rgba(71,85,105,0.4);transition:background .2s,color .2s,border-color .2s,transform .15s;}
.links a:hover{background:#BA55D3;color:#fff;border-color:#DA70D6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(186,85,211,0.4);}
</style>
</head>
<body>
<div class="hero"><img src="https://github.com/victor-onofrei.png" alt=""></div>
<h1>Victor Onofrei's Projects</h1>
<p class="intro">Links to my projects and collections.</p>
<p>Pick one to explore ↓</p>
<nav class="links">
<a href="/Vinyl/">Discogs Catalog</a>
</nav>
</body>
</html>
